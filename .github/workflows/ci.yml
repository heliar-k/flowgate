name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --group test --locked

      - name: Run unit and integration tests
        run: uv run pytest tests/ -v -m ""

      - name: CLI static checks
        run: |
          uv run flowgate --help
          uv run flowgate status --help
          uv run flowgate health --help
          uv run flowgate doctor --help
          uv run flowgate profile --help
          uv run flowgate auth --help
          uv run flowgate auth login --help
          uv run flowgate service --help
          uv run flowgate bootstrap --help
          uv run flowgate bootstrap download --help
          uv run flowgate integration --help
