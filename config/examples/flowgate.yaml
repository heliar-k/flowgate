# FlowGate Configuration - Version 3 (cliproxy-only)
#
# v3 removes LiteLLM/profile/credential sections and derives the running
# cliproxyapi_plus service from the CLIProxyAPIPlus config file.

config_version: 3

paths:
  runtime_dir: "../.router/runtime"
  log_file: "../.router/runtime/events.log"

cliproxyapi_plus:
  # Relative to this file (config/examples/flowgate.yaml)
  config_file: "cliproxyapi.yaml"

auth:
  providers:
    codex:
      method: "oauth_poll"
      auth_url_endpoint: "http://127.0.0.1:8317/v0/management/oauth/codex/auth-url"
      status_endpoint: "http://127.0.0.1:8317/v0/management/oauth/codex/status"

    copilot:
      method: "oauth_poll"
      auth_url_endpoint: "http://127.0.0.1:8317/v0/management/oauth/github-copilot/auth-url"
      status_endpoint: "http://127.0.0.1:8317/v0/management/oauth/github-copilot/status"
